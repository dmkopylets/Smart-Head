services:
  postgres:
    container_name: ${PROJECT_NAME}-postgres
    image: postgres:17.2-alpine
    restart: unless-stopped
    environment:
      POSTGRES_HOST: '${DB_HOST}'
      POSTGRES_DB: '${DB_DATABASE}'
      POSTGRES_USER: '${DB_USERNAME}'
      POSTGRES_PASSWORD: '${DB_PASSWORD:-passw0rd}'
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - ./docker/db/data:/var/lib/postgresql/data:rw
  php-fpm:
    container_name: ${PROJECT_NAME}-php-fpm
    build:
      context: .
      dockerfile: ./docker/php-fpm/Dockerfile
    depends_on:
      - postgres
    environment:
      - APP_ENV=${APP_ENV}
      - APP_SECRET=${APP_SECRET}
      - DATABASE_URL=${DATABASE_URL}
    volumes:
      - ./app/:/var/www/localhost/htdocs/app:cached
      - ./docker/logs/php/:/var/log/php
      - ./docker/php-fpm/php/custom.ini:/usr/local/etc/php/php.ini
      - ./docker/php-fpm/php-fpm.conf:/usr/local/etc/php-fpm.conf
      - ./docker/php-fpm/php-fpm.d/:/usr/local/etc/php-fpm.d
      - php-fpm-socket:/var/run/php-fpm
    ports:
      - "9000:9000"
  apache:
    container_name: ${PROJECT_NAME}-apache
    build:
      context: .
      dockerfile: ./docker/apache/Dockerfile
    volumes:
      - ./app:/usr/local/apache2/htdocs/app:rw
      - ./docker/logs/apache:/usr/local/apache2/logs:rw
      - ./docker/apache/uploads:/usr/local/apache2/uploads
      - php-fpm-socket:/var/run/php-fpm
    depends_on:
      - php-fpm
    ports:
      - "80:80"
      - "443:443"
    environment:
      - APACHE_DOCUMENT_ROOT=/usr/local/apache2/htdocs/public
    extra_hosts:
      - host.docker.internal:${HOST_IP:-172.17.0.1}
volumes:
  php-fpm-socket:
    driver: local